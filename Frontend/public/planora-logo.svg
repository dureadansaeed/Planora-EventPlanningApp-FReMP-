<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Background circle -->
  <circle cx="30" cy="30" r="28" fill="#FFB6C1" opacity="0.2"/>
  
  <!-- Logo circle with gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8B4D5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle -->
  <circle cx="30" cy="30" r="24" fill="url(#logoGradient)"/>
  
  <!-- Inner decorative element -->
  <path d="M 25 35 Q 30 28 35 35 Q 30 38 25 35" fill="white" opacity="0.8"/>
  <circle cx="30" cy="23" r="3" fill="white" opacity="0.8"/>
  
  <!-- Text "Planora" -->
  <text x="65" y="38" font-family="'Poppins', sans-serif" font-size="18" font-weight="600" fill="#4A4A4A">
    Planora
  </text>
  
  <!-- Subtext "Studio" -->
  <text x="65" y="52" font-family="'Abril Fatface', serif" font-size="10" fill="#E8B4D5" letter-spacing="1">
    Studio
  </text>
</svg>
