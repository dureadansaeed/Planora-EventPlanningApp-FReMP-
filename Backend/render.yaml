services:
  - type: web
    name: planora-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 3
    envVars:
      - key: FLASK_ENV
        value: production
        sync: false
      - key: MONGO_URI
        value: ""
        sync: false
      - key: JWT_SECRET_KEY
        value: ""
        sync: false
      - key: MAIL_USERNAME
        value: ""
        sync: false
      - key: MAIL_PASSWORD
        value: ""
        sync: false

# Notes:
# - Fill in the empty env var values in the Render dashboard or use Render Secrets.
# - Adjust `branch` to your deployment branch if not `main`.
